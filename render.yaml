services:
  # ── Backend API ───────────────────────────────────────────────────
  - type: web
    name: ridecompare-api
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: EMAIL_FROM_NAME
        value: RideCompare
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ULTRAMSG_INSTANCE_ID
        sync: false
      - key: ULTRAMSG_TOKEN
        sync: false
      - key: BLAND_AI_API_KEY
        sync: false

  # ── Frontend (static site) ────────────────────────────────────────
  - type: web
    name: ridecompare-web
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ridecompare-api.onrender.com/api/v1
      - key: VITE_OPENCAGE_KEY
        sync: false
      - key: VITE_DEV_PIN
        value: "9999"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
